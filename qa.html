<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question - VoteReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary-color: #a855f7;
            --primary-hover: #c084fc;
            --border-radius: 12px;
            --dim-text: #a1a1aa;
            --error-color: #ef4444;
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.8;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--dim-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-color);
        }

        header {
            margin-bottom: 32px;
            text-align: center;
            margin-top: 20px;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        h1 {
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--dim-text);
            font-size: 1.05rem;
            margin-top: 0;
            margin-bottom: 0;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .chip {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .chip:hover {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: var(--primary-color);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--border-radius);
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input[type="text"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #response-container {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            margin-top: 24px;
        }

        #response-container.visible {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-echo {
            color: var(--dim-text);
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-weight: 500;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
        }

        .answer {
            color: var(--text-color);
            font-size: 1.05rem;
            white-space: pre-wrap;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .reset-btn {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            width: 100%;
        }

        .reset-btn:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .error {
            color: var(--error-color);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: var(--border-radius);
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
    <script src="config.js"></script>
</head>

<body>
    <style>
      .ambient-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; background: #0d0d12; }
      .ambient-orb { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: screen; }
      .orb-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(147, 51, 234, 0.3); }
      .orb-2 { top: 10%; right: -5%; width: 35vw; height: 35vw; background: rgba(37, 99, 235, 0.2); }
      .orb-3 { bottom: -10%; left: 20%; width: 40vw; height: 40vw; background: rgba(219, 39, 119, 0.2); }
      .orb-4 { top: 60%; right: 10%; width: 35vw; height: 35vw; background: rgba(13, 148, 136, 0.2); }
      .noise-bg { position: absolute; inset: 0; opacity: 0.04; mix-blend-mode: overlay; background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E'); }
    </style>
    <div class="ambient-bg">
      <div class="ambient-orb orb-1"></div>
      <div class="ambient-orb orb-2"></div>
      <div class="ambient-orb orb-3"></div>
      <div class="ambient-orb orb-4"></div>
      <div class="noise-bg"></div>
    </div>

    <a href="index.html" class="back-link">← Back to home</a>

    <header>
        <h1>Ask a Voting Question</h1>
        <p class="subtitle">Get answers about voting in India, powered by Gemini.</p>
    </header>

    <div class="chips-container" id="chips">
        <div class="chip">How do I register to vote?</div>
        <div class="chip">What ID do I need at the polling booth?</div>
        <div class="chip">What happens if my name isn't on the voter list?</div>
        <div class="chip">How does the EVM machine work?</div>
    </div>

    <div class="input-group">
        <input type="text" id="question" placeholder="Type your question here..." autocomplete="off">
        <button id="askBtn">Send</button>
    </div>

    <div id="response-container">
        <div class="question-echo" id="question-echo"></div>
        <div class="answer" id="answer"></div>
        <button class="reset-btn" id="resetBtn">Ask another question</button>
    </div>

    <script>
        const questionInput = document.getElementById('question');
        const askBtn = document.getElementById('askBtn');
        const chipsContainer = document.getElementById('chips');
        const responseContainer = document.getElementById('response-container');
        const questionEcho = document.getElementById('question-echo');
        const answerDiv = document.getElementById('answer');
        const resetBtn = document.getElementById('resetBtn');

        // Handle chips click
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                questionInput.value = chip.textContent;
                questionInput.focus();
            });
        });

        // Handle enter key
        questionInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                askBtn.click();
            }
        });

        // Reset state
        resetBtn.addEventListener('click', () => {
            questionInput.value = '';
            questionInput.disabled = false;
            askBtn.disabled = false;
            askBtn.textContent = 'Send';
            responseContainer.classList.remove('visible');
            chipsContainer.style.display = 'flex';
            questionInput.focus();
        });

        askBtn.addEventListener('click', async () => {
            const userQuestion = questionInput.value.trim();
            if (!userQuestion) return;

            if (typeof GEMINI_API_KEY === 'undefined' || !GEMINI_API_KEY) {
                alert('Error: GEMINI_API_KEY is not defined. Make sure config.js is correct.');
                return;
            }

            // Set loading state
            questionInput.disabled = true;
            askBtn.disabled = true;
            askBtn.textContent = 'Thinking...';
            chipsContainer.style.display = 'none';
            responseContainer.classList.remove('visible');

            try {
                const handbook_context = `[Official ECI Voter Handbook Excerpts]
Section 1 (Eligibility): Every Indian citizen aged 18+ on the qualifying date (Jan 1, Apr 1, Jul 1, or Oct 1) is eligible to register.
Section 2 (Registration): Use Form 6 to register. Available online at voters.eci.gov.in or via the Voter Helpline App. You need age proof, address proof, and a passport-size photo.
Section 3 (Polling Day Documents): You must carry your EPIC (Voter ID). If not available, you can use one of 12 ECI-approved alternate photo IDs (e.g. Aadhaar, PAN, Driving License, Indian Passport, MNREGA Job Card). Mobile phones are strictly prohibited inside the booth.
Section 4 (At the Booth): First Polling Officer checks your ID. Second Polling Officer inks your left index finger and gives you a voter slip. Third Polling Officer checks ink and directs you to the EVM compartment.
Section 5 (Voting Process): Press the blue button on the EVM against your chosen candidate. Verify your vote by looking at the VVPAT slip visible for 7 seconds before it drops into the sealed box. Wait for the loud beep sound.
Section 6 (Missing Name): If your name is not on the voter list, you cannot vote. You must submit Form 6 for inclusion. You can check your name on electoralsearch.eci.gov.in or by calling 1950.
Section 7 (Timings): Polling generally happens from 7 AM to 6 PM. Anyone already in the queue at closing time is allowed to vote.`;

                const systemPrompt = "You are a helpful assistant for first-time Indian voters. Answer questions about Indian elections, voter registration, polling procedures, and the Election Commission of India. Keep answers concise — 3 to 5 sentences maximum. Use plain, conversational language. Do NOT cite specific section numbers, document names, or claim to quote from any handbook or document. Do NOT use phrases like 'According to Section X' or 'The handbook says'. If a question is not related to Indian voting or elections, politely redirect to voting topics. Always end your answer with 'For official information, visit voters.eci.gov.in.'\n\n" + handbook_context;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [
                                { text: systemPrompt }
                            ]
                        },
                        contents: [
                            {
                                parts: [
                                    { text: userQuestion }
                                ]
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API Error: ${response.status} - ${errorText}`);
                }

                const data = await response.json();

                let answerText = "Error: Could not parse response.";
                if (data.candidates && data.candidates.length > 0 &&
                    data.candidates[0].content && data.candidates[0].content.parts &&
                    data.candidates[0].content.parts.length > 0) {
                    answerText = data.candidates[0].content.parts[0].text;
                }

                // Show response state
                questionEcho.textContent = `Q: ${userQuestion}`;
                answerDiv.textContent = answerText;

                askBtn.textContent = 'Send';
                responseContainer.classList.add('visible');

            } catch (error) {
                console.error(error);
                questionEcho.textContent = `Q: ${userQuestion}`;
                answerDiv.innerHTML = `<div class="error">${error.message}</div>`;
                askBtn.textContent = 'Send';
                responseContainer.classList.add('visible');
            }
        });
    </script>
<script src="translate.js"></script></body>

</html>
