<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Test</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --input-bg: #1e293b;
            --input-border: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --error-color: #ef4444;
            --border-radius: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--border-radius);
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #response {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--border-radius);
            padding: 20px;
            min-height: 100px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 0.95rem;
            overflow-x: auto;
        }

        .error {
            color: var(--error-color);
        }
        
        .loading {
            opacity: 0.7;
            font-style: italic;
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <h1>Gemini API Test</h1>
        <div class="input-group">
            <input type="text" id="question" placeholder="Ask Gemini something..." autocomplete="off">
            <button id="askBtn">Ask Gemini</button>
        </div>
        <div id="response">Response will appear here...</div>
    </div>

    <script>
        const questionInput = document.getElementById('question');
        const askBtn = document.getElementById('askBtn');
        const responseDiv = document.getElementById('response');

        // Allow pressing Enter to submit
        questionInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                askBtn.click();
            }
        });

        askBtn.addEventListener('click', async () => {
            const userQuestion = questionInput.value.trim();
            if (!userQuestion) return;

            // Check if API key is loaded
            if (typeof GEMINI_API_KEY === 'undefined' || !GEMINI_API_KEY) {
                responseDiv.innerHTML = '<span class="error">Error: GEMINI_API_KEY is not defined. Make sure config.js is correct.</span>';
                return;
            }

            responseDiv.innerHTML = '<span class="loading">Thinking...</span>';
            askBtn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: userQuestion }
                                ]
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP error! status: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0 && 
                    data.candidates[0].content && data.candidates[0].content.parts && 
                    data.candidates[0].content.parts.length > 0) {
                    
                    const answer = data.candidates[0].content.parts[0].text;
                    responseDiv.textContent = answer; // Uses textContent to safely render text
                } else {
                    responseDiv.innerHTML = '<span class="error">Error: Unexpected response structure from API.</span>';
                    console.error("Unexpected response data:", data);
                }
            } catch (error) {
                responseDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            } finally {
                askBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
