<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteReady Checklist</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-radius: 12px;
            --dim-text: #94a3b8;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.5;
        }

        header {
            margin-bottom: 32px;
        }

        .progress-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 16px 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .progress-text {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
            color: var(--text-color);
        }

        .progress-bar {
            height: 8px;
            background-color: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            border-radius: 4px;
            transition: width 0.3s ease-out;
            width: 0%;
        }

        h1 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .intro {
            color: var(--dim-text);
            font-size: 1.05rem;
            margin-top: 0;
            margin-bottom: 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .card.completed {
            opacity: 0.6;
            background: rgba(30, 41, 59, 0.4);
        }

        .card.completed .card-title {
            text-decoration: line-through;
            color: var(--dim-text);
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .card-header:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .done-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 16px;
            cursor: pointer;
            accent-color: var(--primary-color);
            flex-shrink: 0;
        }

        .card-title {
            flex: 1;
            font-weight: 600;
            font-size: 1.05rem;
            margin-right: 12px;
        }

        .category-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: #334155;
            color: #cbd5e1;
            white-space: nowrap;
        }

        .category-eligibility { background-color: rgba(16, 185, 129, 0.15); color: #34d399; }
        .category-registration { background-color: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .category-pollingday { background-color: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .category-documents { background-color: rgba(168, 85, 247, 0.15); color: #c084fc; }

        .card-body {
            display: none;
            padding: 0 20px 20px 56px;
        }

        .card-body.expanded {
            display: block;
        }

        .description {
            margin-top: 0;
            margin-bottom: 16px;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        .steps-list {
            padding-left: 20px;
            margin-bottom: 24px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .steps-list li {
            margin-bottom: 8px;
        }

        .card-links {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 20px;
        }

        .action-link {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        .action-link:hover {
            background-color: var(--primary-hover);
        }

        .action-link:active {
            transform: scale(0.98);
        }

        .source-link {
            color: var(--dim-text);
            text-decoration: underline;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .source-link:hover {
            color: #f8fafc;
        }

        .error {
            color: var(--error-color);
            padding: 20px;
            text-align: center;
            background: rgba(239, 68, 68, 0.1);
            border-radius: var(--border-radius);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--dim-text);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--dim-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to home</a>

    <header>
        <div class="progress-container">
            <div class="progress-text" id="progress-text">0 of 8 complete</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        <h1>Am I Ready to Vote?</h1>
        <p class="intro">Follow these steps to ensure you're fully prepared for polling day.</p>
    </header>

    <main id="checklist-container">
        <div class="loading">Loading checklist...</div>
    </main>

    <script>
        const STORAGE_KEY = 'voteready_checklist_v1';
        let completedItems = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let totalItemsCount = 8; // Default, will update once loaded

        async function loadChecklist() {
            try {
                const response = await fetch('data/checklist.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                totalItemsCount = data.length;
                renderChecklist(data);
                updateProgress();
            } catch (error) {
                document.getElementById('checklist-container').innerHTML = 
                    `<div class="error">Failed to load checklist data: ${error.message}</div>`;
            }
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const isCompleted = completedItems.includes(item.id);
                
                const card = document.createElement('div');
                card.className = `card ${isCompleted ? 'completed' : ''}`;
                card.dataset.id = item.id;
                
                const stepsHtml = item.steps.map(step => `<li>${step}</li>`).join('');
                
                card.innerHTML = `
                    <div class="card-header">
                        <input type="checkbox" class="done-checkbox" ${isCompleted ? 'checked' : ''}>
                        <span class="card-title">${item.title}</span>
                        <span class="category-tag category-${item.category.toLowerCase()}">${item.category}</span>
                    </div>
                    <div class="card-body">
                        <p class="description">${item.description}</p>
                        <ol class="steps-list">${stepsHtml}</ol>
                        <div class="card-links">
                            <a href="${item.officialLink}" class="action-link" target="_blank" rel="noopener">Take action →</a>
                            <a href="${item.source}" class="source-link" target="_blank" rel="noopener">Source</a>
                        </div>
                    </div>
                `;
                
                const header = card.querySelector('.card-header');
                const checkbox = card.querySelector('.done-checkbox');
                const body = card.querySelector('.card-body');
                
                header.addEventListener('click', (e) => {
                    if (e.target !== checkbox) {
                        body.classList.toggle('expanded');
                    }
                });
                
                checkbox.addEventListener('change', (e) => {
                    toggleItem(item.id, e.target.checked, card);
                });
                
                container.appendChild(card);
            });
        }

        function toggleItem(id, isDone, cardElement) {
            if (isDone) {
                if (!completedItems.includes(id)) {
                    completedItems.push(id);
                }
                cardElement.classList.add('completed');
            } else {
                completedItems = completedItems.filter(itemId => itemId !== id);
                cardElement.classList.remove('completed');
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(completedItems));
            updateProgress();
        }

        function updateProgress() {
            const completedCount = completedItems.length;
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');
            
            progressText.textContent = `${completedCount} of ${totalItemsCount} complete`;
            
            const percentage = totalItemsCount === 0 ? 0 : (completedCount / totalItemsCount) * 100;
            progressFill.style.width = `${percentage}%`;
        }

        // Initialize progress bar immediately (even before fetch)
        updateProgress();
        
        // Fetch data
        document.addEventListener('DOMContentLoaded', loadChecklist);
    </script>
</body>
</html>
